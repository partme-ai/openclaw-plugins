<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <title>OpenClaw Vision OCR Test</title>
  <desc>Text-heavy fixture for OCR and readability checks</desc>
  <rect width="400" height="300" fill="#fafafa"/>
  <rect x="20" y="20" width="360" height="260" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="200" y="58" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#374151">Vision OCR Test / 视觉识别测试</text>
  <text x="200" y="118" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="42" font-weight="700" fill="#111827" letter-spacing="0.2em">12345</text>
  <text x="200" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Serial: OC-2026-12345</text>
  <text x="200" y="196" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#4b5563">English line: Read all digits above.</text>
  <text x="200" y="224" text-anchor="middle" font-family="PingFang SC, 'Microsoft YaHei', sans-serif" font-size="15" fill="#4b5563">中文说明：请准确读出数字 12345。</text>
  <text x="200" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#9ca3af">Fixture ID: vision-ocr.svg</text>
</svg>

    tier: L6
    category: prompt-memory
    automation: auto
    priority: P0
    timeout_ms: 120000
    input:
      type: multi_turn
      title: "gotify-q10-multi-turn"
      turns:
        - message: "【{CORRELATION_ID}】请记住编号 ZX-{CORRELATION_ID}，只回复“记住了”。"
          expected_reply_contains_any: ["记住", "记住了"]
        - message: "我刚才让你记住的编号是什么？只回复编号本身。"
          expected_reply_contains: "ZX-{CORRELATION_ID}"
    sdk_inbound_sequence:
      - source:
          channel: gotify
          accountId: "{ACCOUNT_ID}"
          userId: "{PEER_ID}"
          chatType: direct
          agentId: main
        contentType: text
        text: "【{CORRELATION_ID}】请记住编号 ZX-{CORRELATION_ID}，只回复“记住了”。"
        media: []
        direction: inbound
        metadata:
          caseId: Q10
          turn: 1
          promptKind: memory
      - source:
          channel: gotify
          accountId: "{ACCOUNT_ID}"
          userId: "{PEER_ID}"
          chatType: direct
          agentId: main
        contentType: text
        text: "我刚才让你记住的编号是什么？只回复编号本身。"
        media: []
        direction: inbound
        metadata:

schema_version: "1.0.0"
suite_id: openclaw-gotify-llm-prompts-v1
suite_name: openclaw-gotify 大模型提示词测试集
description: >
  面向 openclaw-gotify 的简洁问题集。
  目标不是覆盖所有通道工程细节，而是用 10 组从简单到复杂的提示输入，
  验证 main 智能体能否通过 Gotify 正常收消息、产出新回复消息、并满足常见输出形态要求。
  每条用例同时提供一份与 message-sdk UnifiedMessage 契约对齐的 sdk_inbound /
  sdk_expected_reply 结构，便于后续统一到 message-sdk canonical message model。

default_sla:
  reply_wait_default_ms: 30000
  reply_wait_strict_ms: 45000
  reply_wait_relaxed_ms: 90000

test_cases:
  - id: Q01
    name: 普通文本测试
    tier: L1
    category: prompt-basic
    automation: auto
    priority: P0
    timeout_ms: 45000
    wait_for_reply: true
    reply_timeout_ms: "{default_sla.reply_wait_default_ms}"
    wait_metrics: true
    input:
      type: text
      title: "gotify-q01-plain-text"
      message: "【{CORRELATION_ID}】请只回复：收到"
    sdk_inbound:
      source:
        channel: gotify
        accountId: "{ACCOUNT_ID}"
        userId: "{PEER_ID}"
        chatType: direct
        agentId: main
      contentType: text
      text: "【{CORRELATION_ID}】请只回复：收到"
      media: []
      direction: inbound
      metadata:
        caseId: Q01
        promptKind: plain_text
    sdk_expected_reply:
      source:
        channel: gotify
        accountId: "{ACCOUNT_ID}"
        userId: "{PEER_ID}"
        chatType: direct
        agentId: main
      contentType: text
      text_rule: non_empty
      media: []
      direction: outbound
    channel_expected_payload:
      title: "gotify-q01-plain-text"
      priority: 5
      extras:
        openclaw:
          outbound: true
          source: openclaw
    reply_assertions:
      min_length: 2
      contains_any: ["收到"]
    expected:
      reply_received: true
    gotify_assertions:
      require_main_agent: true
      session_key_equals: "agent:main:gotify:{ACCOUNT_ID}:direct:{PEER_ID}"
      transcript_user_contains: "【{CORRELATION_ID}】"
      message_list_title: "gotify-q01-plain-text"
      message_list_expected_count_by_title: 2
      message_list_require_user_visible: true
      message_list_require_reply_visible: true
      message_list_reply_matches_transcript: true


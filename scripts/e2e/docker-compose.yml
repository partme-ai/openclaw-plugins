# OpenClaw plugin E2E — backing services + optional OpenClaw gateway container.
#
# Backing services only:
#   docker compose -f scripts/e2e/docker-compose.yml up -d
#
# Include OpenClaw gateway (when not using host fallback):
#   docker compose -f scripts/e2e/docker-compose.yml up -d openclaw
#
# Host gateway fallback (recommended on Mac when bind-mount + CLI paths are simpler):
#   OPENCLAW_E2E_HOST_GATEWAY=1 node scripts/e2e/run-e2e.mjs

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: openclaw-e2e-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 15s

  gotify:
    image: gotify/server:latest
    container_name: openclaw-e2e-gotify
    ports:
      - "18080:80"
    environment:
      GOTIFY_DEFAULTUSER_NAME: admin
      GOTIFY_DEFAULTUSER_PASS: openclaw-e2e

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.2
    container_name: openclaw-e2e-rmq-namesrv
    command: sh mqnamesrv
    ports:
      - "9876:9876"

  rocketmq-broker:
    image: apache/rocketmq:5.3.2
    container_name: openclaw-e2e-rmq-broker
    depends_on:
      - rocketmq-namesrv
    command: sh mqbroker -n rocketmq-namesrv:9876
    ports:
      - "10911:10911"
      - "10912:10912"
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876

  rocketmq-proxy:
    image: apache/rocketmq:5.3.2
    container_name: openclaw-e2e-rmq-proxy
    depends_on:
      - rocketmq-broker
    command: sh mqproxy -n rocketmq-namesrv:9876
    ports:
      - "8081:8080"
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876

  openclaw:
    image: node:22-bookworm-slim
    container_name: openclaw-e2e-gateway
    depends_on:
      - rabbitmq
      - gotify
      - rocketmq-proxy
    working_dir: /workspace
    ports:
      - "${E2E_GATEWAY_PORT:-19789}:${E2E_GATEWAY_PORT:-19789}"
    environment:
      OPENCLAW_PROFILE: queue-e2e
      E2E_GATEWAY_PORT: ${E2E_GATEWAY_PORT:-19789}
      OPENCLAW_E2E_REPO: /workspace
      OPENCLAW_E2E_STATE_DIR: /state
      OPENCLAW_E2E_HOME: /root
      NODE_OPTIONS: --disable-warning=ExperimentalWarning
    volumes:
      - ${OPENCLAW_E2E_REPO:-../../}:/workspace
      - ${OPENCLAW_E2E_STATE_HOST:-${HOME}/.openclaw-queue-e2e}:/state
      - ./docker/openclaw-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').connect(19789,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 30s
